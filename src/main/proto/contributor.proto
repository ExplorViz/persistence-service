syntax = "proto3";

option java_multiple_files = true;
option java_package = "net.explorviz.code.proto";
option java_outer_classname = "ContributorProto";

import "google/protobuf/empty.proto";

service ContributorService {
  rpc PersistContributor (ContributorData) returns (google.protobuf.Empty) {}
}

message ContributorData {
  // Git data
  string landscape_token = 1;
  string repository_name = 2;
  string contributor_id = 3;
  string name = 4;
  string email = 5;

  // GitHub-specific data
  string username = 6;
  string avatar_url = 7;
}

message CommitAuthorAssociation {
  string landscape_token = 1;
  string repository_name = 2;
  string commit_id = 3;
  string contributor_id = 4;
}

